name: Tests

on:
  pull_request


jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write

    services:
      redis:
        image: redis:7.4
        ports:
          - 6379:6379

    env:
      PHP_VERSION: '8.4'
      PHP_EXTENSIONS: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
      CACHE_KEY: extension-cache-v1

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3


      - name: Setup
        uses: ./.github/actions/setup


      - name: Install Dependencies
        run: composer install -q --no-interaction

      - name: Prep Application
        run: |
          touch database/database.sqlite
          cp .env.example .env
          php artisan key:generate

      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: php artisan test --compact

