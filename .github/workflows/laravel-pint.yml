name: Laravel Pint

on:
  pull_request:


jobs:
  larave-pint:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write


    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3

      - name: Setup PHP and Composer
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install Laravel Pint
        run: composer global require laravel/pint

      - name: Run Pint
        run: pint --test

      - name: Pusth Changes back to the repo
        run: echo "TODO"
